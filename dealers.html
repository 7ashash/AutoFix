<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Car Dealers - AutoFix</title>
  <link rel="stylesheet" href="site-shell.css" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <style>
    .dealers-page {
      width: min(1180px, 92vw);
      margin: 50px auto;
    }

    .dealers-hero {
      background: linear-gradient(rgba(11, 19, 32, 0.72), rgba(11, 19, 32, 0.72)),
        url("./pictures/911.jpg");
      background-size: cover;
      background-position: center;
      color: white;
      text-align: center;
      padding: 96px 24px;
      border-radius: 28px;
      margin-bottom: 40px;
    }

    .dealers-hero h2 {
      font-size: 40px;
      margin-bottom: 12px;
    }

    .dealers-hero p {
      font-size: 18px;
      color: rgba(229, 236, 246, 0.82);
      max-width: 760px;
      margin: 0 auto;
      line-height: 1.8;
    }

    .dealers-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 25px;
    }

    .dealer-card {
      background: white;
      border-radius: 22px;
      padding: 24px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      text-align: center;
      border: 1px solid rgba(31, 45, 74, 0.08);
    }

    .dealer-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 18px 36px rgba(15, 23, 42, 0.12);
    }

    .dealer-card img {
      width: 100%;
      height: 180px;
      object-fit: contain;
      border-radius: 16px;
      margin-bottom: 18px;
      background: #fff;
      padding: 12px;
    }

    .dealer-card h3 {
      font-size: 23px;
      margin-bottom: 10px;
      color: #122033;
    }

    .dealer-meta {
      color: #5f6e86;
      margin-bottom: 10px;
      font-size: 15px;
    }

    .dealer-rating {
      color: #1f2d4a;
      font-weight: 800;
      margin-bottom: 14px;
    }

    .dealer-brands {
      color: #2f3e56;
      font-size: 14px;
      margin-bottom: 12px;
      line-height: 1.7;
      min-height: 48px;
    }

    .dealer-description {
      color: #6b7280;
      font-size: 14px;
      line-height: 1.7;
      margin-bottom: 18px;
      min-height: 72px;
    }

    .dealer-actions button {
      border: none;
      background: #1f2d4a;
      color: white;
      padding: 12px 18px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .dealer-actions button:hover {
      background: #16233b;
      transform: translateY(-1px);
    }

    @media (max-width: 768px) {
      .dealers-hero h2 {
        font-size: 30px;
      }

      .dealers-hero p {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>

  <div id="site-header"></div>

  <main class="dealers-page">
    <section class="dealers-hero">
      <h2>Choose a dealer, then choose its supported vehicles</h2>
      <p>
        Every dealer now takes you first to the cars and brands it supports on AutoFix,
        then to the compatible spare parts for the selected vehicle.
      </p>
    </section>

    <section class="dealers-grid" id="dealersGrid"></section>
  </main>

  <div id="site-footer"></div>

  <script src="site-shell.js"></script>
  <script src="autofix-data.js"></script>
  <script src="catalog-api.js"></script>
  <script src="dealers.js"></script>
</body>
</html>
